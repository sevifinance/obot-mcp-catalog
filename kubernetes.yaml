toolPreview:
  - name: configuration_view
    description: Get the current Kubernetes configuration content as kubeconfig YAML
  - name: namespaces_list
    description: List all Kubernetes namespaces in the cluster
  - name: events_list
    description: List events in a namespace (or all namespaces)
    params:
      namespace: Optional namespace (omit for all)
  - name: resources_list
    description: List Kubernetes resources of any kind
    params:
      apiVersion: API version (e.g. v1, apps/v1, networking.k8s.io/v1)
      kind: Resource kind (e.g. Pod, Deployment, Ingress)
      namespace: Optional namespace for namespaced resources
      labelSelector: Optional label selector
  - name: resources_get
    description: Get a specific Kubernetes resource
    params:
      apiVersion: API version
      kind: Resource kind
      name: Resource name
      namespace: Namespace (for namespaced resources)
  - name: resources_create_or_update
    description: Create or update a Kubernetes resource from a YAML/JSON manifest
    params:
      resource: Resource manifest (YAML or JSON string)
  - name: resources_delete
    description: Delete a Kubernetes resource
    params:
      apiVersion: API version
      kind: Resource kind
      name: Resource name
      namespace: Namespace
  - name: pods_list
    description: List pods in all namespaces
    params:
      labelSelector: Optional label selector
  - name: pods_list_in_namespace
    description: List pods in a specific namespace
    params:
      namespace: Namespace to list pods in
      labelSelector: Optional label selector
  - name: pods_get
    description: Get a pod by namespace and name
    params:
      namespace: Namespace
      name: Pod name
  - name: pods_delete
    description: Delete a pod
    params:
      namespace: Namespace
      name: Pod name
  - name: pods_log
    description: Get logs from a pod
    params:
      namespace: Namespace
      name: Pod name
      container: Optional container name
      previous: If true, return previous terminated container logs
  - name: pods_top
    description: Show CPU/memory usage metrics for pods
    params:
      namespace: Optional namespace (omit for all)
      name: Optional pod name
  - name: pods_exec
    description: Execute a command in a running pod
    params:
      namespace: Namespace
      name: Pod name
      container: Optional container
      command: Command to execute (array)
  - name: pods_run
    description: Run a container image as a pod
    params:
      namespace: Namespace
      image: Container image
      name: Optional pod name
      port: Optional port to expose
  - name: helm_install
    description: Install a Helm chart
    params:
      chart: Chart reference (repo/chart or oci URL)
      namespace: Target namespace
      name: Release name
      values: Optional values (YAML)
  - name: helm_list
    description: List Helm releases
    params:
      namespace: Optional namespace (omit for all)
  - name: helm_uninstall
    description: Uninstall a Helm release
    params:
      namespace: Namespace
      name: Release name
  - name: projects_list
    description: List OpenShift Projects
