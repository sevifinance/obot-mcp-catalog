name: Kubernetes
shortDescription: Manage Kubernetes and OpenShift resources on Sevi cluster2
description: |
  Kubernetes MCP server (official [containers/kubernetes-mcp-server](https://github.com/containers/kubernetes-mcp-server))
  pre-wired to Sevi's production Rancher cluster (**cluster2**). Full read/write access via a
  dedicated ClusterRoleBinding on the `kubernetes-mcp` ServiceAccount in the `obot-mcp` namespace.

  ## Features

  - **Generic resources**: CRUD on any Kubernetes/OpenShift resource (Pods, Deployments, Services, CRDs, ...)
  - **Pods**: list, get, delete, logs, top, exec, run
  - **Namespaces & events**: list namespaces, view events
  - **Helm**: install, list, uninstall releases
  - **OpenShift Projects** and **Tekton** pipelines/tasks
  - Native Go implementation (no kubectl/helm shelling out)

  ## What you'll need to connect

  All credentials are pre-configured. The MCP uses a baked-in kubeconfig that targets cluster2 via
  the in-cluster API (`https://kubernetes.default.svc`) and authenticates with the `kubernetes-mcp`
  ServiceAccount (bound to `cluster-admin`). No setup required.

  To target a different cluster, override the **Kubeconfig** field with your own kubeconfig file.

  ## Safety

  This server has full read/write on cluster2. Use it carefully. If you want to restrict to
  read-only or non-destructive operations, disable the relevant tools in the MCP's tool allowlist
  after installation (e.g. `resources_delete`, `resources_create_or_update`, `pods_delete`,
  `pods_exec`, `pods_run`, `helm_install`, `helm_uninstall`).

metadata:
  categories: Cloud & Infrastructure, DevOps
icon: https://kubernetes.io/icons/icon-128x128.png
repoURL: https://github.com/containers/kubernetes-mcp-server
runtime: uvx
uvxConfig:
  package: kubernetes-mcp-server
env:
  - key: KUBECONFIG
    name: Kubeconfig
    required: true
    sensitive: true
    file: true
    description: Kubeconfig file with cluster access. Default targets Sevi cluster2 via the `kubernetes-mcp` ServiceAccount (cluster-admin).
    value: |-
      apiVersion: v1
      kind: Config
      clusters:
        - name: cluster2
          cluster:
            server: https://kubernetes.default.svc
            certificate-authority-data: 
      contexts:
        - name: cluster2
          context:
            cluster: cluster2
            user: kubernetes-mcp
            namespace: default
      current-context: cluster2
      users:
